server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_vary on;
    gzip_min_length 512;

    # SPA fallback: return index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (filenames are content-hashed)
    location /assets {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Optional: reverse-proxy to Honcho API to eliminate CORS
    # Uncomment and replace honcho-server:8000 with your Honcho API address
    #
    # location /v3 {
    #     proxy_pass http://honcho-server:8000;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }
    #
    # location /health {
    #     proxy_pass http://honcho-server:8000;
    # }
}
